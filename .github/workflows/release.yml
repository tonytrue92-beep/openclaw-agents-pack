# GitHub Release workflow для openclaw-agents-pack (wave 10).
#
# Триггер: push тега вида v2026.* или v2027.*
#
# Что делает:
#   1. Проверяет что тег и INSTALLER_VERSION в скрипте совпадают
#   2. Подменяет __COMMIT_PLACEHOLDER__ на реальный коммит-хэш
#   3. Запускает scripts/build-bundle.sh
#   4. Регенерирует SHA256SUMS для bundled-файла
#   5. Публикует GitHub Release с install-agents-bundled.sh как asset
#
# После релиза клиент может использовать стабильный URL:
#   https://github.com/<owner>/openclaw-agents-pack/releases/latest/download/install-agents-bundled.sh
#
# Который перенаправляется на конкретный релизный asset — обходит
# raw.githubusercontent rate-limit / firewall (BUG-06 из техотчёта).
#
# Security: все user-controlled inputs (если бы такие были) идут через
# env: с экранированием. github.ref_name = название тега, безопасно.

name: Release bundled installer

on:
  push:
    tags:
      - 'v2026.*'
      - 'v2027.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag matches INSTALLER_VERSION
        run: |
          tag_version="${TAG_NAME#v}"
          installer_version=$(grep -E '^INSTALLER_VERSION=' scripts/install-agents.sh \
            | sed -E 's/.*"(.*)"/\1/')
          if [[ "$tag_version" != "$installer_version" ]]; then
            echo "ERROR: tag '$tag_version' не совпадает с INSTALLER_VERSION='$installer_version'"
            echo "       Обнови INSTALLER_VERSION в scripts/install-agents.sh перед тегом."
            exit 1
          fi
          echo "OK: tag ${tag_version} совпадает с INSTALLER_VERSION"

      - name: Substitute commit hash into INSTALLER_COMMIT
        run: |
          commit_short=$(git rev-parse --short HEAD)
          sed -i.bak "s/__COMMIT_PLACEHOLDER__/${commit_short}/" scripts/install-agents.sh
          rm -f scripts/install-agents.sh.bak
          echo "OK: INSTALLER_COMMIT = ${commit_short}"

      - name: Build self-contained bundle
        run: bash scripts/build-bundle.sh

      - name: Verify bundle is well-formed
        run: |
          bash -n dist/install-agents-bundled.sh
          bash dist/install-agents-bundled.sh --version
          bash dist/install-agents-bundled.sh --help > /dev/null
          echo "OK: bundled --version и --help отвечают"

      - name: Generate SHA256 checksum for bundle
        run: |
          cd dist
          sha256sum install-agents-bundled.sh > install-agents-bundled.sh.sha256
          cat install-agents-bundled.sh.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: .github/release-body-template.md
          files: |
            dist/install-agents-bundled.sh
            dist/install-agents-bundled.sh.sha256
          draft: false
          prerelease: false

  # ─── Wave 13: macOS DMG installer ──────────────────────────────
  # Параллельно с release-job. Собирает DMG только на macOS-runner
  # (нужен hdiutil). Прикрепляет DMG к тому же GitHub Release —
  # softprops/action-gh-release@v2 умеет append'ить assets к
  # существующему релизу с тем же name+tag.
  build-dmg:
    name: Build macOS DMG installer
    runs-on: macos-latest
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build DMG
        run: bash scripts/build-dmg.sh

      - name: Verify DMG mounts cleanly (final integrity check)
        run: |
          # build-dmg.sh уже делает internal mount/detach test, но
          # повторим явно в CI для прозрачности логов.
          mount_info=$(hdiutil attach -nobrowse -noverify -readonly \
            dist/OpenClaw-Setup.dmg 2>&1)
          mount_point=$(echo "$mount_info" | tail -1 | awk '{$1=$2=""; sub(/^[ \t]+/, ""); print}')
          if [[ -z "$mount_point" || ! -d "$mount_point" ]]; then
            echo "ERROR: DMG не смонтировался"
            echo "$mount_info"
            exit 1
          fi
          echo "DMG mounted at: $mount_point"
          ls -la "$mount_point"
          hdiutil detach "$mount_point"
          echo "OK: DMG смонтировался, файлы видны, размонтировался"

      - name: Attach DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          # body_path не указываем — release уже создан release-job'ом
          # с body. Этот step просто добавляет файлы к существующему.
          files: |
            dist/OpenClaw-Setup.dmg
            dist/OpenClaw-Setup.dmg.sha256
          draft: false
          prerelease: false
