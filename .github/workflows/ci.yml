# CI for openclaw-agents-pack.
# Does NOT interpolate any user-controlled inputs (issue/PR titles,
# commit messages, etc.) into run steps — no command-injection surface.
# The matrix values (debian/alpine) are defined inline in this file.

name: Lint & smoke

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'templates/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'SHA256SUMS'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'templates/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'SHA256SUMS'

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - run: |
          shellcheck \
            --severity=warning \
            --exclude=SC1090,SC1091,SC2155,SC2086,SC2034 \
            scripts/install-agents.sh \
            scripts/diagnose-agents.sh \
            scripts/update-checksums.sh \
            scripts/security-audit.sh \
            scripts/smoke-test.sh \
            scripts/lib/*.sh

  syntax:
    name: bash -n
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          set -euo pipefail
          for f in scripts/*.sh scripts/lib/*.sh; do
            echo "checking $f"
            bash -n "$f"
          done
          echo "all scripts pass bash -n"

  smoke:
    name: Helper functions smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/smoke-test.sh

  security-audit:
    name: Security audit (no secret leaks + templates clean)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/security-audit.sh

  checksums:
    name: SHA256SUMS freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          set -euo pipefail
          if [[ ! -f SHA256SUMS ]]; then
            echo "SHA256SUMS file is missing. Run: bash scripts/update-checksums.sh"
            exit 1
          fi
          tmp=$(mktemp)
          for f in scripts/*.sh scripts/lib/*.sh templates/*/*.md; do
            sha256sum "$f" >> "$tmp"
          done
          committed=$(grep -vE '^(#|$)' SHA256SUMS | sort)
          current=$(sort "$tmp")
          if [[ "$committed" != "$current" ]]; then
            echo "SHA256SUMS is out of date. Run: bash scripts/update-checksums.sh"
            echo ""
            echo "--- committed ---"
            echo "$committed"
            echo "--- current ---"
            echo "$current"
            exit 1
          fi
          echo "SHA256SUMS is up to date"

  docker-smoke:
    name: Docker smoke (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [debian, alpine]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        env:
          VARIANT: ${{ matrix.variant }}
        run: docker build -t "openclaw-agents-pack-test:${VARIANT}" -f "tests/docker/Dockerfile.${VARIANT}" .
      - name: Run smoke checks
        env:
          VARIANT: ${{ matrix.variant }}
        run: docker run --rm "openclaw-agents-pack-test:${VARIANT}"

  build-bundle:
    name: Build self-contained bundle (wave 10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run build-bundle
        run: bash scripts/build-bundle.sh
      - name: Verify bundle is well-formed
        run: |
          bash -n dist/install-agents-bundled.sh
          bash dist/install-agents-bundled.sh --version
          bash dist/install-agents-bundled.sh --help > /dev/null
          echo "OK: bundled --version и --help отвечают"
      - name: Bundle should not contain BUNDLE_LIB_BEGIN markers
        run: |
          # После build markers должны быть только в исходном install-agents.sh,
          # но не в bundled-выходе (там source-блок заменён на inline).
          # Проверяем что в bundled-файле есть оба маркера (мы их сохраняем
          # для защиты от повторной сборки), но между ними должно быть
          # inline-содержимое lib/*, а не source-команды.
          if grep -q 'source "${SCRIPT_DIR}/lib/' dist/install-agents-bundled.sh; then
            echo "ERROR: bundled-файл содержит source команды — bundle не собрался корректно"
            exit 1
          fi
          # Должны быть inline-маркеры
          if ! grep -q 'BUNDLED lib/\* (wave 10 self-contained)' dist/install-agents-bundled.sh; then
            echo "ERROR: bundled-файл не содержит inline-блок"
            exit 1
          fi
          echo "OK: bundle содержит inline lib/*, не source"
